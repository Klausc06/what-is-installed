name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: choco install shellcheck -y

      - name: shellcheck
        run: shellcheck --severity=error bin/what-is-installed lib/platform.sh lib/render.sh install.sh

      - name: Run tests
        run: bash tests/run.sh
