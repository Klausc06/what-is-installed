name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck --severity=error bin/what-is-installed lib/*.sh lib/platform/*.sh lib/providers/*.sh install.sh

      - name: Run tests
        run: bash -x tests/run.sh 2>&1 || { echo "TESTS FAILED (exit=$?)"; exit 1; }

      - name: Smoke test (install + run)
        run: |
          bash install.sh
          export PATH="$HOME/.local/bin:$PATH"
          NO_COLOR=1 what-is-installed 2>&1 | head -15

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Prevent CRLF conversion
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - name: Strip CR (safety net for CRLF)
        run: sed -i 's/\r$//' bin/what-is-installed lib/*.sh lib/platform/*.sh lib/providers/*.sh install.sh

      - name: Install shellcheck
        run: choco install shellcheck -y

      - name: shellcheck
        run: shellcheck --severity=error bin/what-is-installed lib/*.sh lib/platform/*.sh lib/providers/*.sh install.sh

      - name: Run tests
        run: bash tests/run.sh

  powershell-install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test install.ps1
        shell: pwsh
        run: |
          ./install.ps1
          $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
          bash -c "what-is-installed" 2>&1 | head -5

      - name: Run tests after PowerShell install
        shell: bash
        run: bash tests/run.sh
